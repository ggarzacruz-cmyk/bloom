<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bloom × openLearn</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;padding:0;background:#080f0c;">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    // App code will load inline
  </script>
  <script>
    fetch('App.jsx')
      .then(r => r.text())
      .then(code => {
        const script = document.createElement('script');
        script.type = 'text/babel';
        script.setAttribute('data-presets', 'react');
        script.text = code + '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));';
        document.body.appendChild(script);
        Babel.transformScriptTags();
      });
  </script>
</body>
</html>
